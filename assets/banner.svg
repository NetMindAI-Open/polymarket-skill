<svg viewBox="0 0 1280 360" width="1280" height="360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Polymarket Skill — query and trade prediction markets from your AI agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#150B30"/>
      <stop offset="1" stop-color="#0A0E22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2D7FF9"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C4CCF5"/>
    </linearGradient>
    <linearGradient id="yes" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#2EA043"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1F44"/>
      <stop offset="1" stop-color="#0C0F2A"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2D7FF9" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2D7FF9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#9FB0FF" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#dots)"/>
  <ellipse cx="1050" cy="170" rx="300" ry="230" fill="url(#glowP)"/>
  <ellipse cx="120" cy="80" rx="320" ry="180" fill="url(#glowB)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- LEFT: text -->
  <rect x="64" y="84" width="186" height="30" rx="15" fill="#7C5CFF" fill-opacity="0.12" stroke="#7C5CFF" stroke-opacity="0.5"/>
  <text x="82" y="104" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" letter-spacing="2.5" font-weight="700" fill="#B6A8FF">AI AGENT SKILL</text>

  <text x="61" y="184" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="68" font-weight="800" fill="url(#title)">Polymarket Skill</text>
  <rect x="65" y="200" width="130" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="66" y="244" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#AEB8E6">Search markets · read live odds · place trades —</text>
  <text x="66" y="273" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#AEB8E6">in plain language, powered by the <tspan fill="#D6DCFF" font-weight="600">poly</tspan> CLI.</text>

  <!-- command chips -->
  <g font-family="'SFMono-Regular',Consolas,monospace" font-size="13.5" fill="#C7D0F7">
    <rect x="66"  y="300" width="196" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="80"  y="320">poly markets search</text>
    <rect x="274" y="300" width="92"  height="30" rx="15" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="288" y="320">poly buy</text>
    <rect x="378" y="300" width="158" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <text x="392" y="320">poly positions</text>
  </g>

  <!-- RIGHT: live market card -->
  <g>
    <rect x="872" y="66" width="344" height="226" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <circle cx="897" cy="99" r="4.5" fill="#3FB950"/>
    <text x="912" y="103" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" letter-spacing="2" font-weight="700" fill="#8C97C6">LIVE MARKET</text>
    <text x="1192" y="103" text-anchor="end" font-family="'SFMono-Regular',Consolas,monospace" font-size="12" fill="#8C97C6">Vol $1.2M</text>

    <text x="896" y="140" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="600" fill="#EAEEFF">Will Brazil win the</text>
    <text x="896" y="163" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="600" fill="#EAEEFF">2026 World Cup?</text>

    <text x="896" y="214" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="46" font-weight="800" fill="#FFFFFF">67%</text>
    <text x="1000" y="214" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#3FB950">YES</text>

    <rect x="896" y="232" width="296" height="12" rx="6" fill="#F0506E"/>
    <rect x="896" y="232" width="198" height="12" rx="6" fill="url(#yes)"/>
    <rect x="1090" y="232" width="2" height="12" fill="#0C0F2A"/>

    <text x="896" y="266" font-family="'SFMono-Regular',Consolas,monospace" font-size="13" fill="#3FB950">YES 0.67</text>
    <text x="1192" y="266" text-anchor="end" font-family="'SFMono-Regular',Consolas,monospace" font-size="13" fill="#F0506E">NO 0.33</text>
  </g>
</svg>
